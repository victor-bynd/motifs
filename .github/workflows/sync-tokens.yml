# .github/workflows/sync-tokens.yml
# ─────────────────────────────────────────────────────────────────────────────
# Token Sync Workflow
#
# Triggers:
#   1. Automatically — when the production token file is pushed to main/develop
#   2. Manually      — via the "Run workflow" button in the GitHub Actions UI
#
# What it does:
#   - Runs scripts/merge_tokens.py
#   - Opens a Pull Request with:
#       · The merged design-team token file
#       · A Markdown diff report (missing tokens + changed values)
# ─────────────────────────────────────────────────────────────────────────────

name: 🔄 Sync Tokens

on:
  # ── Auto: triggers when the production file is updated on main/develop ──────
  push:
    branches:
      - main
      - develop
    paths:
      - "tokens/production.json"      # ← adjust if your prod file lives elsewhere

  # ── Manual: "Run workflow" button in the Actions tab ────────────────────────
  workflow_dispatch:
    inputs:
      notes:
        description: "Optional notes for the PR (e.g. 'Accordion tokens added')"
        required: false
        default: ""

jobs:
  sync-tokens:
    name: Diff & Merge Token Files
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to push the new branch
      pull-requests: write   # needed to open the PR

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Run the merge script ────────────────────────────────────────────
      - name: Run token merge & diff
        id: merge
        run: |
          python scripts/merge_tokens.py \
            --design  tokens/design-team.json \
            --prod    tokens/production.json \
            --output  tokens/design-team-merged.json \
            --report  tokens/diff-report.md \
            --ignore  tokens/sync-ignore.json
        # Exit code meanings:
        #   0 → clean (only missing tokens, no value changes)
        #   2 → changed values detected (PR still opens, but flagged)
        continue-on-error: true   # we always want to open the PR

      # ── 4. Check if anything actually changed ─────────────────────────────
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet tokens/design-team-merged.json tokens/diff-report.md 2>/dev/null \
             && git ls-files --error-unmatch tokens/design-team-merged.json 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ── 5. Capture merge script exit code for PR label ────────────────────
      - name: Set PR flags
        id: flags
        run: |
          EXIT="${{ steps.merge.outcome }}"
          # Read the diff report to count changed values
          CHANGED=$(grep -c "^| \`" tokens/diff-report.md 2>/dev/null | tail -1 || echo "0")

          if grep -q "⚠️ Changed Values" tokens/diff-report.md 2>/dev/null; then
            echo "has_changes_in_values=true"  >> $GITHUB_OUTPUT
            echo "pr_label=⚠️ value changes"  >> $GITHUB_OUTPUT
          else
            echo "has_changes_in_values=false" >> $GITHUB_OUTPUT
            echo "pr_label=🆕 new tokens only" >> $GITHUB_OUTPUT
          fi

      # ── 6. Create a branch and commit ──────────────────────────────────────
      - name: Commit merged files
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH="token-sync/$(date +'%Y-%m-%d-%H%M')"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add tokens/design-team-merged.json tokens/diff-report.md
          git commit -m "chore(tokens): sync with production — $(date +'%Y-%m-%d')"
          git push origin "$BRANCH"

      # ── 7. Open the Pull Request ───────────────────────────────────────────
      - name: Open Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH }}
          base: main
          title: "🔄 Token sync — ${{ steps.flags.outputs.pr_label }} · ${{ github.event.inputs.notes || github.event.head_commit.message }}"
          body: |
            ## Token Sync

            This PR was auto-generated by the **Token Sync** workflow.

            ${{ steps.flags.outputs.has_changes_in_values == 'true' && '> ⚠️ **Changed values were detected.** Please review the diff report before merging.' || '> ✅ Only new/missing tokens were added. No existing values were modified.' }}

            ---

            ### What's inside

            | File | Description |
            |---|---|
            | `tokens/design-team-merged.json` | Merged token file — ready to import in Tokens Studio |
            | `tokens/diff-report.md` | Full diff: missing tokens + changed values |

            ---

            ### How to review

            1. Open **`tokens/diff-report.md`** in this PR to see the full breakdown
            2. If there are ⚠️ **changed values**, decide whether to accept production's version or keep the design team's
            3. Merge when happy — then re-import `design-team-merged.json` into Tokens Studio

            ---

            _Triggered by: `${{ github.event_name }}` · ${{ github.sha }}_
          labels: "tokens, sync"
          draft: false

      # ── 8. No-op message if nothing changed ───────────────────────────────
      - name: Nothing to sync
        if: steps.check.outputs.has_changes == 'false'
        run: echo "✅ No token differences found. Design file is already in sync with production."
