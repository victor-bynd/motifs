# .github/workflows/sync-tokens.yml
# ─────────────────────────────────────────────────────────────────────────────
# Token Sync Workflow
#
# Triggers:
#   1. Automatically — when the production token file is pushed to main/develop
#   2. Manually      — via the "Run workflow" button in the GitHub Actions UI
#
# What it does:
#   - Runs scripts/merge_tokens.py
#   - Opens a DRAFT Pull Request (cannot be merged until you manually
#     mark it "Ready for review") with:
#       · The merged design-team token file
#       · A Markdown diff report (missing tokens + changed values)
#
# ⚠️  AUTO-MERGE IS INTENTIONALLY DISABLED.
#     The PR is always opened as a draft. You must:
#       1. Review the diff report inside the PR
#       2. Click "Ready for review" to un-draft it
#       3. Merge manually when happy
# ─────────────────────────────────────────────────────────────────────────────

name: 🔄 Sync Tokens

on:
  # ── Auto: triggers when the production file is updated on main/develop ──────
  push:
    branches:
      - main
      - develop
    paths:
      - "production.json"          # lives at repo root level, OUTSIDE tokens/

  # ── Manual: "Run workflow" button in the Actions tab ────────────────────────
  workflow_dispatch:
    inputs:
      notes:
        description: "Optional notes for the PR (e.g. 'Accordion tokens added')"
        required: false
        default: ""

jobs:
  sync-tokens:
    name: Diff & Merge Token Files
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to push the new branch
      pull-requests: write   # needed to open the PR

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Run the merge script ────────────────────────────────────────────
      - name: Run token merge & diff
        id: merge
        run: |
          python scripts/merge_tokens.py \
            --design-dir  tokens \
            --prod        production.json \
            --ignore      tokens/sync-ignore.json
        # Exit code 0 → only missing tokens added
        # Exit code 2 → changed values detected (PR still opens, flagged)
        continue-on-error: true   # always open the PR regardless

      # ── 4. Check if anything actually changed ─────────────────────────────
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet -- "tokens/" 2>/dev/null && \
             [ -z "$(git status --porcelain tokens/)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ── 5. Set PR flags based on diff report ──────────────────────────────
      - name: Set PR flags
        id: flags
        run: |
          if grep -q "⚠️ Changed Values" tokens/diff-report.md 2>/dev/null; then
            echo "has_value_changes=true"   >> $GITHUB_OUTPUT
            echo "pr_label=⚠️ value changes" >> $GITHUB_OUTPUT
          else
            echo "has_value_changes=false"  >> $GITHUB_OUTPUT
            echo "pr_label=🆕 new tokens only" >> $GITHUB_OUTPUT
          fi

      # ── 6. Create a branch and commit ──────────────────────────────────────
      - name: Commit merged files
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH="token-sync/$(date +'%Y-%m-%d-%H%M')"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add tokens/
          git commit -m "chore(tokens): sync with production — $(date +'%Y-%m-%d')"
          git push origin "$BRANCH"

      # ── 7. Open a DRAFT Pull Request ───────────────────────────────────────
      #
      #  draft: true  →  PR cannot be merged until you click "Ready for review"
      #  auto-merge is NOT configured anywhere in this workflow (it is off by
      #  default on GitHub unless explicitly enabled in repo settings — keep it off)
      # ──────────────────────────────────────────────────────────────────────
      - name: Open Draft Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH }}
          base: main
          title: "🔄 [DRAFT] Token sync — ${{ steps.flags.outputs.pr_label }} · ${{ github.event.inputs.notes || github.event.head_commit.message }}"
          body: |
            ## 🔄 Token Sync — Review Required

            > 📋 **This is a DRAFT PR — it cannot be merged until you mark it "Ready for review".**
            > Open `tokens/diff-report.md` in the **Files changed** tab to see the full breakdown, then merge when happy.

            ---

            ${{ steps.flags.outputs.has_value_changes == 'true' && '> ⚠️ **Changed values were detected.** Review carefully before merging — production values differ from your design file.' || '> ✅ Only new/missing tokens were added. No existing values were modified.' }}

            ---

            ### What's inside this PR

            | File | What changed |
            |---|---|
            | `tokens/Snap Motif/*.json` | Updated token set files — re-import in Tokens Studio after merging |
            | `tokens/diff-report.md` | Full diff report: new tokens, changed values, design-only tokens |

            ---

            ### Your review checklist

            - [ ] Open **Files changed** → review `tokens/diff-report.md`
            - [ ] If there are ⚠️ **changed values** — decide whether to keep your design value or accept production's
            - [ ] Click **"Ready for review"** to un-draft this PR
            - [ ] Merge
            - [ ] Re-import the updated set files in Tokens Studio

            ---

            _Triggered by: `${{ github.event_name }}` · `${{ github.sha }}`_
          labels: "tokens, sync"
          draft: true          # ← DRAFT: blocks merging until you manually un-draft it

      # ── 8. No-op message if nothing changed ───────────────────────────────
      - name: Nothing to sync
        if: steps.check.outputs.has_changes == 'false'
        run: echo "✅ No token differences found. Design file is already in sync with production."
